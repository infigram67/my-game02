<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Глава государства</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Глава государства</h1>

  <div id="menu">
    <button id="startBtn">Начать игру</button>
  </div>

  <div id="game" style="display:none;">

    <div class="stats">
      <p>Год: <span id="year"></span></p>
      <p>Экономика: <span id="economy"></span></p>
      <p>Армия: <span id="army"></span></p>
      <p>Стабильность: <span id="stability"></span></p>
      <p>Дипломатия: <span id="diplomacy"></span></p>
    </div>

    <div class="event-box">
      <p id="eventText"></p>
    </div>

    <div class="mode-buttons">
      <button onclick="setMode('internal')">Внутренняя</button>
      <button onclick="setMode('external')">Внешняя</button>
    </div>

    <div id="choices"></div>

    <button onclick="location.reload()">Перезапуск</button>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
